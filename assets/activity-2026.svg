<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AtharvaMaik 2026 GitHub activity terminal</title>
  <desc id="desc">Animated terminal panel showing 83 total contributions, 76 commits, 7 repository contributions, 9 active days, best day 2026-04-23 with 35 contributions, 7 public repositories, and 3 public stars.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="900" y1="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.52" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2dd4bf" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
      .label { fill: #8dd3ff; font-size: 15px; font-weight: 600; }
      .value { fill: #e5f3ff; font-size: 28px; font-weight: 800; }
      .muted { fill: #94a3b8; font-size: 13px; }
      .prompt { fill: #34d399; font-size: 15px; font-weight: 700; }
      .cmd { fill: #e2e8f0; font-size: 15px; }
      .scan { animation: scan 4.2s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      .blink { animation: blink 1s steps(2, start) infinite; }
      .float1 { animation: float 5s ease-in-out infinite; }
      .float2 { animation: float 6.5s ease-in-out infinite reverse; }
      .draw { stroke-dasharray: 520; stroke-dashoffset: 520; animation: draw 4s ease-in-out infinite; }
      .bar1 { animation: grow1 3.8s ease-in-out infinite; transform-origin: 154px 0; }
      .bar2 { animation: grow2 3.8s ease-in-out infinite; transform-origin: 154px 0; }
      .bar3 { animation: grow3 3.8s ease-in-out infinite; transform-origin: 154px 0; }
      @keyframes scan { from { transform: translateY(-80px); opacity: .05; } 35% { opacity: .45; } to { transform: translateY(390px); opacity: .05; } }
      @keyframes pulse { 0%,100% { opacity: .72; } 50% { opacity: 1; } }
      @keyframes blink { 0%,45% { opacity: 1; } 46%,100% { opacity: 0; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes draw { 0% { stroke-dashoffset: 520; opacity:.2; } 45%,65% { stroke-dashoffset: 0; opacity:1; } 100% { stroke-dashoffset: -520; opacity:.2; } }
      @keyframes grow1 { 0%,100% { transform: scaleX(.22); } 45%,70% { transform: scaleX(.83); } }
      @keyframes grow2 { 0%,100% { transform: scaleX(.18); } 45%,70% { transform: scaleX(.76); } }
      @keyframes grow3 { 0%,100% { transform: scaleX(.12); } 45%,70% { transform: scaleX(.35); } }
    </style>
  </defs>

  <rect width="900" height="360" rx="18" fill="url(#panel)"/>
  <rect x="1" y="1" width="898" height="358" rx="17" stroke="#1e293b" stroke-width="2"/>
  <g opacity="0.18">
    <path d="M0 52H900M0 104H900M0 156H900M0 208H900M0 260H900M0 312H900" stroke="#38bdf8" stroke-width="0.6"/>
    <path d="M75 0V360M150 0V360M225 0V360M300 0V360M375 0V360M450 0V360M525 0V360M600 0V360M675 0V360M750 0V360M825 0V360" stroke="#14b8a6" stroke-width="0.45"/>
  </g>
  <rect class="scan" x="0" y="0" width="900" height="78" fill="url(#line)"/>

  <g transform="translate(26 22)">
    <rect width="848" height="316" rx="14" fill="#050b14" stroke="#273449"/>
    <rect width="848" height="42" rx="14" fill="#0b1220"/>
    <circle cx="24" cy="21" r="6" fill="#ef4444"/>
    <circle cx="45" cy="21" r="6" fill="#f59e0b"/>
    <circle cx="66" cy="21" r="6" fill="#22c55e"/>
    <text x="96" y="27" class="mono muted">atharva@github: ~/activity_2026</text>

    <g transform="translate(28 70)">
      <text x="0" y="0" class="mono prompt">$ gh activity --year 2026</text>
      <rect class="blink" x="222" y="-15" width="9" height="19" rx="2" fill="#67e8f9"/>
      <text x="0" y="34" class="mono cmd">loading contribution stream...</text>
      <text x="0" y="62" class="mono muted">source: GitHub contributions through 2026-04-23</text>
    </g>

    <g transform="translate(28 168)">
      <text x="0" y="0" class="mono label">total_contributions</text>
      <text x="0" y="38" class="mono value">83</text>
      <rect x="154" y="14" width="250" height="10" rx="5" fill="#102033"/>
      <rect class="bar1" x="154" y="14" width="250" height="10" rx="5" fill="#22d3ee" filter="url(#glow)"/>
      <text x="0" y="78" class="mono label">commit_contributions</text>
      <text x="0" y="116" class="mono value">76</text>
      <rect x="154" y="92" width="250" height="10" rx="5" fill="#102033"/>
      <rect class="bar2" x="154" y="92" width="250" height="10" rx="5" fill="#2dd4bf" filter="url(#glow)"/>
    </g>

    <g transform="translate(492 82)">
      <rect class="float1" x="0" y="0" width="140" height="86" rx="12" fill="#0f172a" stroke="#1d4ed8"/>
      <text x="18" y="30" class="mono label">active_days</text>
      <text x="18" y="66" class="mono value">9</text>

      <rect class="float2" x="162" y="0" width="158" height="86" rx="12" fill="#0f172a" stroke="#0f766e"/>
      <text x="180" y="30" class="mono label">best_day</text>
      <text x="180" y="63" class="mono" fill="#e5f3ff" font-size="19" font-weight="800">2026-04-23</text>

      <rect class="float2" x="0" y="108" width="140" height="86" rx="12" fill="#0f172a" stroke="#0f766e"/>
      <text x="18" y="138" class="mono label">best_count</text>
      <text x="18" y="174" class="mono value">35</text>

      <rect class="float1" x="162" y="108" width="158" height="86" rx="12" fill="#0f172a" stroke="#1d4ed8"/>
      <text x="180" y="138" class="mono label">public_repos</text>
      <text x="180" y="174" class="mono value">7</text>
    </g>

    <path class="draw" d="M31 298 C132 252, 212 318, 312 268 S492 234, 590 270 S721 326, 818 258" stroke="#67e8f9" stroke-width="3" fill="none" filter="url(#glow)"/>
    <text x="28" y="292" class="mono muted">repo_contributions=7</text>
    <text x="702" y="292" class="mono muted">stars=3</text>
  </g>
</svg>