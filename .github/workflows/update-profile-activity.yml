name: Update profile activity graphic

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/update_activity_svg.py"
      - ".github/workflows/update-profile-activity.yml"

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate animated activity SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: AtharvaMaik
        run: python scripts/update_activity_svg.py

      - name: Commit updated activity graphic
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update profile activity graphic
          file_pattern: assets/activity-2026.svg